name: Build CV PDF

on:
  push:
    paths:
      - 'cv.tex'
  workflow_dispatch: # Allow manual trigger

jobs:
  build-cv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout the website repo (fetch full history to avoid push conflicts)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Compile LaTeX to PDF
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex

      # 3. Rename and move the compiled PDF
      - name: Rename compiled PDF
        run: |
          cp cv.pdf "My Resume.pdf"

      # 4. Check for changes and commit
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "My Resume.pdf"

          if git diff --cached --quiet; then
            echo "✅ No changes detected in CV — skipping commit."
          else
            git commit -m "📄 Auto-build CV from cv.tex ($(date -u '+%Y-%m-%d'))"
            # Pull any new changes first, then push (avoids rejected push)
            git pull --rebase origin main
            git push
            echo "✅ CV updated and pushed successfully!"
          fi
